name: Nature Magazine
run-name: "Nature: ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue Date (YYYY-MM-DD) - 留空则抓取最新一期'
        required: false
        default: ''
  schedule:
    - cron: '0 20 * * 3'

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ===== 关键修改：安装依赖并设置环境变量 =====
      - name: Install dependencies and setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-util1 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxcb1 \
            libxau6 \
            libxdmcp6

          # 创建 libEGL 的软链接，确保系统能找到
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libEGL.so.1 /usr/lib/libEGL.so.1 || true
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libOpenGL.so.0 /usr/lib/libOpenGL.so.0 || true

      # ===== 修改安装方式：直接使用 Calibre 的二进制包 =====
      - name: Install Calibre (binary download)
        run: |
          # 下载 Calibre 二进制包
          wget -nv https://download.calibre-ebook.com/9.11.0/calibre-9.11.0-x86_64.txz
          sudo tar -xvf calibre-9.11.0-x86_64.txz -C /opt
          # 创建软链接
          sudo ln -sf /opt/calibre/calibre /usr/local/bin/calibre
          sudo ln -sf /opt/calibre/ebook-convert /usr/local/bin/ebook-convert
          sudo ln -sf /opt/calibre/ebook-meta /usr/local/bin/ebook-meta
          # 验证安装
          export QT_QPA_PLATFORM=offscreen
          /usr/local/bin/calibre --version

      - name: Fetch Nature
        run: |
          mkdir -p output
          export QT_QPA_PLATFORM=offscreen
          if [ -n "${{ github.event.inputs.issue_date }}" ]; then
            echo "抓取指定日期: ${{ github.event.inputs.issue_date }}"
            /usr/local/bin/ebook-convert nature.recipe output/nature.epub \
              --output-profile=kindle \
              --recipe-specific-option=date:${{ github.event.inputs.issue_date }}
          else
            echo "抓取最新一期"
            /usr/local/bin/ebook-convert nature.recipe output/nature.epub --output-profile=kindle
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nature-$(date +%Y%m%d)
          path: output/
