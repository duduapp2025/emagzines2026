name: Nature Magazine
run-name: "Nature: ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue Date (YYYY-MM-DD) - 留空则抓取最新一期'
        required: false
        default: ''
  schedule:
    - cron: '0 20 * * 3'

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ===== 精简依赖 =====
      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libgl1 \
            libglib2.0-0 \
            libxcb-xinerama0 \
            libxrender1 \
            libxext6

      # ===== 使用官方安装脚本，跳过依赖检测 =====
      - name: Install Calibre
        run: |
          # 清理可能存在的旧链接
          sudo rm -f /usr/local/bin/calibre /usr/local/bin/ebook-convert /usr/local/bin/ebook-meta
          # 使用环境变量跳过库检测
          export SKIP_DEPS_CHECK=1
          export QT_QPA_PLATFORM=offscreen
          sudo -v
          wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo SKIP_DEPS_CHECK=1 sh /dev/stdin
          # 验证安装
          /usr/bin/calibre --version || /opt/calibre/calibre --version

      - name: Fetch Nature
        run: |
          mkdir -p output
          export QT_QPA_PLATFORM=offscreen
          # 使用完整路径调用
          CALIBRE_CMD="/opt/calibre/ebook-convert"
          if [ ! -f "$CALIBRE_CMD" ]; then
            CALIBRE_CMD="ebook-convert"
          fi
          if [ -n "${{ github.event.inputs.issue_date }}" ]; then
            echo "抓取指定日期: ${{ github.event.inputs.issue_date }}"
            $CALIBRE_CMD nature.recipe output/nature.epub \
              --output-profile=kindle \
              --recipe-specific-option=date:${{ github.event.inputs.issue_date }}
          else
            echo "抓取最新一期"
            $CALIBRE_CMD nature.recipe output/nature.epub --output-profile=kindle
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nature-$(date +%Y%m%d)
          path: output/
