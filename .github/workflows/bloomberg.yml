name: Bloomberg Businessweek
run-name: "Bloomberg: ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue Date (YYYY-MM-DD) - 留空则抓取最新一期'
        required: false
        default: ''
  schedule:
    - cron: '0 20 * * 1'  # 每周一 UTC 20:00 (北京时间周二凌晨4点)

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libgl1 \
            libglib2.0-0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-util1 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxcb1 \
            libxau6 \
            libxdmcp6

      - name: Install Calibre
        run: |
          sudo rm -f /usr/local/bin/calibre /usr/local/bin/ebook-convert /usr/local/bin/ebook-meta
          export SKIP_DEPS_CHECK=1
          export QT_QPA_PLATFORM=offscreen
          sudo -v
          wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo SKIP_DEPS_CHECK=1 sh /dev/stdin
          /opt/calibre/calibre --version || /usr/bin/calibre --version

      - name: Fetch Bloomberg Businessweek
        run: |
          mkdir -p output
          export QT_QPA_PLATFORM=offscreen
          CALIBRE_CMD="/opt/calibre/ebook-convert"
          if [ ! -f "$CALIBRE_CMD" ]; then
            CALIBRE_CMD="ebook-convert"
          fi

          CMD="$CALIBRE_CMD bloomberg-business-week.recipe output/bloomberg.epub --output-profile=kindle"

          if [ -n "${{ github.event.inputs.issue_date }}" ]; then
            CLEAN_DATE="${{ github.event.inputs.issue_date }}"
            echo "抓取指定日期: $CLEAN_DATE"
            CMD="$CMD '--recipe-specific-option=date:$CLEAN_DATE'"
          else
            echo "抓取最新一期"
          fi

          echo "执行命令: $CMD"
          bash -c "$CMD"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloomberg-$(date +%Y%m%d)
          path: output/
