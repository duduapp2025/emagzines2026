name: Financial Times
run-name: "Financial Times: ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      days:
        description: '抓取过去N天的文章（默认1.15天）'
        required: false
        default: '1.15'
  schedule:
    - cron: '0 6 * * 1,3,5'  # 每周一、三、五 UTC 6:00 (北京时间下午2点)

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libopengl0 \
            libgl1 \
            libglib2.0-0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-util1 \
            libxrender1 \
            libxext6 \
            libx11-6 \
            libxcb1 \
            libxau6 \
            libxdmcp6

      - name: Install Calibre
        run: |
          sudo rm -f /usr/local/bin/calibre /usr/local/bin/ebook-convert /usr/local/bin/ebook-meta
          export SKIP_DEPS_CHECK=1
          export QT_QPA_PLATFORM=offscreen
          sudo -v
          wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo SKIP_DEPS_CHECK=1 sh /dev/stdin
          /opt/calibre/calibre --version || /usr/bin/calibre --version

      - name: Fetch Financial Times
        run: |
          mkdir -p output
          export QT_QPA_PLATFORM=offscreen
          CALIBRE_CMD="/opt/calibre/ebook-convert"
          if [ ! -f "$CALIBRE_CMD" ]; then
            CALIBRE_CMD="ebook-convert"
          fi

          CMD="$CALIBRE_CMD financial_times.recipe output/financial_times.epub --output-profile=kindle"

          if [ -n "${{ github.event.inputs.days }}" ]; then
            DAYS="${{ github.event.inputs.days }}"
            echo "抓取过去 $DAYS 天的文章"
            CMD="$CMD '--recipe-specific-option=days:$DAYS'"
          else
            echo "抓取过去1.15天的文章"
            CMD="$CMD '--recipe-specific-option=days:1.15'"
          fi

          echo "执行命令: $CMD"
          bash -c "$CMD"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-times-$(date +%Y%m%d)
          path: output/
